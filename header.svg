<svg width="100%" height="220" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 2px #21D375); }
      50% { filter: drop-shadow(0 0 12px #21D375); }
    }
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(800%); }
    }
    .bg { fill: #0d1117; }
    .scanline {
      fill: rgba(33, 211, 117, 0.03);
      animation: scanline 8s linear infinite;
    }
    .title {
      font-family: 'Courier New', monospace;
      font-size: 28px;
      font-weight: bold;
      fill: #21D375;
      animation: fadeIn 1s ease-out, glow 3s ease-in-out infinite;
    }
    .subtitle {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      fill: #8b949e;
      animation: fadeIn 1.5s ease-out;
    }
    .cursor {
      fill: #21D375;
      animation: blink 1s step-end infinite;
    }
    .prompt {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      fill: #58a6ff;
      animation: fadeIn 2s ease-out;
    }
    .line {
      stroke: #21D375;
      stroke-width: 0.5;
      opacity: 0.15;
    }
    .dot {
      fill: #21D375;
      opacity: 0.08;
    }
  </style>

  <rect class="bg" width="100%" height="220" rx="0"/>

  <!-- Grid pattern -->
  <g>
    <line class="line" x1="0" y1="55" x2="100%" y2="55"/>
    <line class="line" x1="0" y1="110" x2="100%" y2="110"/>
    <line class="line" x1="0" y1="165" x2="100%" y2="165"/>
  </g>

  <!-- Scanline effect -->
  <rect class="scanline" x="0" y="0" width="100%" height="30" rx="0"/>

  <!-- Main content -->
  <text class="prompt" x="50%" y="60" text-anchor="middle">eos@arch:~$</text>
  <text class="title" x="50%" y="100" text-anchor="middle">EOS XAVIER</text>
  <text class="subtitle" x="50%" y="130" text-anchor="middle">site reliability engineer · devops · automation</text>

  <!-- Blinking cursor -->
  <rect class="cursor" x="50%" y="145" width="8" height="16" rx="1">
    <animate attributeName="x" from="50%" to="50%" dur="0s"/>
  </rect>

  <text class="subtitle" x="50%" y="180" text-anchor="middle">building resilient systems that don't page me at 3am</text>

  <!-- Corner decorations -->
  <text x="15" y="20" font-family="Courier New" font-size="10" fill="#21D375" opacity="0.4">┌──</text>
  <text x="15" y="210" font-family="Courier New" font-size="10" fill="#21D375" opacity="0.4">└──</text>
</svg>
